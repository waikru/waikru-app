<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — Waikru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap">
  <style>
    :root {
      --bg: #f1f5f9;
      --bg-white: #ffffff;
      --bg-zone: #fafcfd;
      --text: #19202a;
      --text-strong: #141a20;
      --text-muted: #3d4751;
      --text-dim: #748090;
      --border: #dfe4ea;
      --border-strong: #d1d9e1;
      --accent: #e8432d;
      --accent-hover: #d63a25;
    }
    [data-theme="dark"] {
      --bg: #0d0d0d;
      --bg-white: #1a1a1a;
      --bg-zone: #141414;
      --text: #f0f0f0;
      --text-strong: #ffffff;
      --text-muted: #b5bfc8;
      --text-dim: #8a96a3;
      --border: #2a2a2a;
      --border-strong: #3a3a3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-strong);
      text-decoration: none;
      margin-bottom: 32px;
      display: block;
      text-align: center;
    }
    .logo span { color: var(--accent); }
    .card {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
    }
    .card h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-strong);
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }
    .card .sub {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }
    .error-banner {
      background: #fef2f0;
      border: 1px solid #fca99a;
      color: #b91c0c;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .success-banner {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #15803d;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    [data-theme="dark"] .error-banner { background: #2a1010; border-color: #7a2020; color: #f87171; }
    [data-theme="dark"] .success-banner { background: #0d2a1a; border-color: #166534; color: #4ade80; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-dim);
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg-zone);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      min-height: 48px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .back-link {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
    }
    .back-link a {
      color: var(--text-dim);
      text-decoration: none;
    }
    .back-link a:hover { color: var(--text-strong); }
  </style>
</head>
<body>

<a href="/" class="logo">wai<span>kru</span></a>

<div class="card">
  <h1>Change password</h1>
  <p class="sub">Choose a new password for your account</p>

  {% if error %}
  <div class="error-banner">{{ error }}</div>
  {% endif %}

  {% if success %}
  <div class="success-banner">Password updated successfully.</div>
  {% endif %}

  {% if not success %}
  <form method="POST" action="/change-password">
    <div class="field">
      <label for="new_password">New password</label>
      <input type="password" id="new_password" name="new_password" placeholder="••••••••" required autocomplete="new-password" minlength="6">
    </div>
    <div class="field">
      <label for="confirm_password">Confirm new password</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required autocomplete="new-password">
    </div>
    <button type="submit" class="btn-primary">Update password</button>
  </form>
  {% endif %}
</div>

<p class="back-link"><a href="/dashboard">← Back to dashboard</a></p>

<script>
  const saved = localStorage.getItem('waikru-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
</script>
</body>
</html>
