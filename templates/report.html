<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coaching Report — Waikru</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap">
  <style>
    :root {
      --bg: #f1f5f9;
      --bg-white: #ffffff;
      --bg-card: #ffffff;
      --text: #19202a;
      --text-strong: #141a20;
      --text-muted: #3d4751;
      --text-dim: #748090;
      --border: #dfe4ea;
      --border-strong: #d1d9e1;
      --accent: #e8432d;
      --accent-hover: #d63a25;
      --accent-soft: #fdece9;
    }
    [data-theme="dark"] {
      --bg: #0d0d0d;
      --bg-white: #1a1a1a;
      --bg-card: #141414;
      --text: #f0f0f0;
      --text-strong: #ffffff;
      --text-muted: #b5bfc8;
      --text-dim: #8a96a3;
      --border: #2a2a2a;
      --border-strong: #3a3a3a;
      --accent-soft: #2a1612;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }
    nav {
      background: none;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .nav-inner {
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-strong);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .btn-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 18px;
      min-height: 44px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-pill:hover { background: var(--accent-hover); }
    .btn-pill-outline {
      display: inline-flex;
      align-items: center;
      padding: 8px 18px;
      min-height: 44px;
      background: transparent;
      color: var(--text-strong);
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .btn-pill-outline:hover { border-color: var(--accent); color: var(--accent); }

    .main-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }
    .report-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .report-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(232,67,45,0.2);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 16px;
    }
    .report-header h1 {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--text-strong);
      margin-bottom: 8px;
    }
    .report-header .subtitle {
      font-size: 14px;
      color: var(--text-dim);
    }
    .report-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 36px;
    }
    .coaching-content h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-strong);
      margin: 28px 0 10px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      letter-spacing: -0.2px;
    }
    .coaching-content h2:first-child { border-top: none; margin-top: 0; padding-top: 0; }
    .coaching-content h3 { font-size: 15px; font-weight: 700; color: var(--text-strong); margin: 16px 0 6px; }
    .coaching-content p { font-size: 14px; color: var(--text-muted); line-height: 1.7; margin-bottom: 10px; }
    .coaching-content ul, .coaching-content ol { padding-left: 20px; margin-bottom: 12px; }
    .coaching-content li { font-size: 14px; color: var(--text-muted); line-height: 1.65; margin-bottom: 4px; }
    .coaching-content strong { color: var(--text-strong); font-weight: 700; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-dim);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text-strong); }

    footer {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
    }
    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      font-family: inherit;
    }
    .theme-toggle:hover { color: var(--text-strong); }

    @media (max-width: 600px) {
      .nav-inner { padding: 12px 18px; }
      .main-wrap { padding: 28px 18px 60px; }
      .report-card { padding: 22px 20px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo">wai<span>kru</span></a>
    <div class="nav-right">
      <a href="/dashboard" class="btn-pill-outline">Dashboard</a>
      <a href="/" class="btn-pill">New analysis</a>
    </div>
  </div>
</nav>

<div class="main-wrap">
  <a href="/dashboard" class="back-link">
    ← Back to dashboard
  </a>

  <div class="report-header">
    <div class="report-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px;"><polyline points="20 6 9 17 4 12"></polyline></svg>
      Analysis complete
    </div>
    <h1>Your Coaching Report</h1>
    <div class="subtitle">{{ discipline_label }} &nbsp;·&nbsp; AI Analysis &nbsp;·&nbsp; {{ report.created_at[:10] if report.created_at else '' }}</div>
  </div>

  <div class="report-card">
    <div class="coaching-content" id="coaching-content"></div>
  </div>
</div>

<footer>
  <span>waikru.app</span>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span id="themeEmoji">☀️</span>
  </button>
</footer>

<script>
  // Inject report markdown safely via template
  const rawMarkdown = {{ report.result_markdown | tojson }};
  document.getElementById('coaching-content').innerHTML = marked.parse(rawMarkdown);

  // Theme
  function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('waikru-theme', next);
    document.getElementById('themeEmoji').textContent = next === 'dark' ? '🌙' : '☀️';
  }
  (function() {
    const saved = localStorage.getItem('waikru-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('themeEmoji').textContent = saved === 'dark' ? '🌙' : '☀️';
    }
  })();
</script>
</body>
</html>
